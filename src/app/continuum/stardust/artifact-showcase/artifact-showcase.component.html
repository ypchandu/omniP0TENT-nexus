<section class="projects-carousel">
  <app-section-particles></app-section-particles>
  <div class="projects-header">
    <h2>My Projects</h2>
    <span>Take a look at what I’ve built</span>
  </div>

  <div class="projects-frame">
    <div class="projects-track">
      <div class="projects-page">
        <!-- Dynamic Cards -->
        <div class="project-card" *ngFor="let project of projects">
          <a href="#" (click)="openModal(project, $event)">
            <div class="card-front">
              <img [src]="project.image" [alt]="project.title" class="project-img" />
            </div>
            <div class="card-back">
              <div class="card-back-bg" [style.background-image]="'url(' + project.image + ')'"></div>
              <div class="card-back-overlay"></div>
              <div class="project-back-content">
                <h3>{{ project.title }}</h3>
                <p>{{ project.shortDesc }}</p>
                <span class="card-btn">View Details</span>
              </div>
            </div>
          </a>
        </div>
      </div>
      <!-- Duplicate for infinite marquee scroll on mobile -->
      <div class="projects-page duplicate-page" aria-hidden="true">
        <div class="project-card" *ngFor="let project of projects">
          <a href="#" (click)="openModal(project, $event)">
            <div class="card-front">
              <img [src]="project.image" [alt]="project.title" class="project-img" />
            </div>
            <div class="card-back">
              <div class="card-back-bg" [style.background-image]="'url(' + project.image + ')'"></div>
              <div class="card-back-overlay"></div>
              <div class="project-back-content">
                <h3>{{ project.title }}</h3>
                <p>{{ project.shortDesc }}</p>
                <span class="card-btn">View Details</span>
              </div>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Project Details Modal -->
  <div class="project-modal-backdrop" *ngIf="isModalOpen" (click)="closeModal()">
    <div class="project-modal-content" (click)="$event.stopPropagation()">
      <button class="close-modal-btn" (click)="closeModal()">&times;</button>

      <div class="modal-body" *ngIf="selectedProject">
        <div class="modal-image-container">
          <img [src]="selectedProject.image" [alt]="selectedProject.title" class="modal-img" />
        </div>

        <div class="modal-info-container">
          <h2 class="neon-modal-title">{{ selectedProject.title }}</h2>
          <p class="modal-description">{{ selectedProject.shortDesc }}</p>

          <div class="modal-insights">
            <h3>Key Insights & Impact</h3>
            <ul>
              <li *ngFor="let insight of selectedProject.insights">
                <i class="fas fa-check-circle"></i> {{ insight }}
              </li>
            </ul>
          </div>

          <div class="modal-actions">
            <a [href]="selectedProject.githubLink" target="_blank" class="github-link-btn">
              <i class="fab fa-github"></i> View Repository
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
