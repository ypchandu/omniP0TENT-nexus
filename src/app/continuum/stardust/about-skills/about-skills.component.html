<!-- Horizontal scroll starts immediately from About -->
<section class="carousel-wrapper" #carousel>
  <!-- Panel 1: About -->
  <div class="panel panel--about">
    <div class="about-content">
      <img src="assets/quantum_hero.jpg" alt="Profile" class="about-img"/>
      <div class="about-text">
        <h2>About Me</h2>
        <p>{{ intro }}</p>
      </div>
    </div>
  </div>

  <!-- Panel 2: Programming -->
  <div class="panel">
    <h3 (click)="toggleProg()">Programming ▼</h3>
    <ul [class.open]="showProg">
      <li>Python</li>
      <li>Pandas</li>
      <li>PySpark</li>
      <li>NumPy</li>
      <li>R (Basic)</li>
    </ul>
  </div>

  <!-- Panel 3: Database -->
  <div class="panel">
    <h3 (click)="toggleDb()">Database ▼</h3>
    <ul [class.open]="showDb">
      <li>MySQL</li>
      <li>NoSQL</li>
      <li>PostgreSQL</li>
      <li>MongoDB</li>
    </ul>
  </div>

  <!-- Panel 4: Cloud Platforms -->
  <div class="panel">
    <h3 (click)="toggleCloud()">Cloud Platforms ▼</h3>
    <ul [class.open]="showCloud">
      <li>AWS</li>
      <li>Azure</li>
      <li>GCP</li>
    </ul>
  </div>

  <!-- Panel 5: Tools & Technologies -->
  <div class="panel">
    <h3 (click)="toggleTools()">Tools & Technologies ▼</h3>
    <ul [class.open]="showTools">
      <li>Tableau</li>
      <li>Docker</li>
      <li>Git</li>
      <li>Jira</li>
      <li>Linux</li>
    </ul>
  </div>

  <!-- Panel 6: Certifications -->
  <div class="panel certs-panel">
    <h3>Certifications</h3>
    <div class="cert-grid">
      <a href="https://verify.skill-lync.com/python" target="_blank">
        <img src="assets/certification/1.png" alt="Core & Advanced Python Programming"/>
      </a>
      <a href="https://verify.skill-lync.com/tableau" target="_blank">
        <img src="assets/certification/2.png" alt="Data Analysis & Visualization (Tableau)"/>
      </a>
      <a href="https://verify.skill-lync.com/sql" target="_blank">
        <img src="assets/certification/3.png" alt="SQL for Data Science"/>
      </a>
      <a href="https://verify.skill-lync.com/excel" target="_blank">
        <img src="assets/certification/4.png" alt="Excel for Data Analysis"/>
      </a>
    </div>
  </div>
</section>
