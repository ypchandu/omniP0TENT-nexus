<section class="signal-contact-wrapper">
  <!-- Particle background -->
  <div class="particles-container"></div>
  
  <!-- Left Panel -->
  <div class="contact-left-panel">
    <div class="connection-display">
      <div class="neon-connection">LET'S<br>CONNECT</div>
      <div class="signal-tower">
        <div class="tower-base"></div>
        <div class="tower-pole"></div>
        <div class="tower-antenna">
          <div class="signal-pulse"></div>
          <div class="signal-pulse"></div>
          <div class="signal-pulse"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="contact-right-panel">
    <div class="form-card" id="formCard">
      <h2 class="neon-title">Send a Signal</h2>
      
      <div class="input-container">
        <input id="nameInput" type="text" required />
        <label>Your Name</label>
        <div class="input-glow"></div>
      </div>
      
      <div class="input-container">
        <input id="emailInput" type="email" required />
        <label>Email Address</label>
        <div class="input-glow"></div>
      </div>
      
      <div class="input-container">
        <textarea id="messageInput" rows="5" required></textarea>
        <label>Your Message</label>
        <div class="input-glow"></div>
      </div>
      
      <button id="sendButton" class="neon-button">
                  <a  href="mailto:yp.chand9@gmail.com?subject=Contact from Portfolio&body=Hi Prem, I am reaching out to you from your portfolio.">
              <span>TRANSMIT MESSAGE</span>
              <div class="button-glow"></div>
              <div class="button-beam"></div>
            </a>
      </button>
    </div>
  </div>

  <!-- Enhanced Footer -->
  <footer class="footer">
  <video
    #footerVid
    class="footer-video"
    autoplay muted playsinline loop preload="auto"
  >
    <source src="assets/pixel_h264.mp4" type="video/mp4" />
  </video>
    
    <div class="footer-grid">
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
    </div>
    
    <div class="footer-content">
      <div class="signature-container">
        <p class="neon-signature">Designed by Prem</p>
        <div class="signature-glow"></div>
      </div>
      
<div class="footer-links">
                <a href="https://linkedin.com/in/yangalapremchand" target="_blank" class="neon-link" title="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://github.com/ypchandu" target="_blank" class="neon-link" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="mailto:yp.chand9@gmail.com" class="neon-link" title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
                <a href="https://www.naukri.com/mnjuser/profile" target="_blank" class="neon-link" title="Naukri">
                    <i class="fas fa-briefcase"></i>
                </a>
                <a href="https://www.instagram.com/__omnip0tent__?igsh=d3V3YzE1Z3AzdXQw&utm_source=qr/" target="_blank" class="neon-link" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
    
      </div>
    </div>

</section>
